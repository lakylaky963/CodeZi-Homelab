name: Deploy Web App to Homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Copy Files to Web Directory
        run: |
          if [ ! -w /var/www/html ]; then
            echo "/var/www/html is not writable by the runner user.\nPlease ensure the self-hosted runner user owns /var/www/html or configure passwordless sudo on the host."
            exit 1
          fi
          rsync -avz --delete --exclude='.git/' --exclude='node_modules/' --exclude='client/node_modules/' --exclude='client/dist/' ./ /var/www/html/

      - name: Deploy Backend Updates
        run: |
          cd /var/www/html/server
          npm install
          pm2 restart backend-api || pm2 start src/server.js --name "backend-api"

      - name: Clean previous dist folder
        run: sudo rm -rf /var/www/html/client/dist

      - name: Deploy Frontend Updates
        run: |
          cd /var/www/html/client
          npm install
          npm run build