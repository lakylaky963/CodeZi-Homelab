name: Deploy Web App to Homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Copy Files to Web Directory
        run: |
          rsync -avz --delete --exclude='.git/' --exclude='node_modules/' --exclude='client/node_modules/' ./ /var/www/html/
        # run: |
        #   rsync -avz --delete --exclude='.git/' ./ /var/www/html/

      - name: Deploy Backend Updates
        run: |
          cd /var/www/html/server
          npm install
          pm2 restart backend-api || pm2 start src/server.js --name "backend-api"

      - name: Deploy Frontend Updates
        run: |
          cd /var/www/html/client
          npm install
          npm run build